services:
  rag-app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - EMBEDDING_PROVIDER=local
      - RERANKER_PROVIDER=local
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CHROMA_PERSIST_DIR=/app/chroma_db
    volumes:
      - chroma_data:/app/chroma_db
    # Nécessaire uniquement pour la génération de réponse finale (le
    # retrieval/ingestion tourne sans clé, voir README §Stack).

volumes:
  chroma_data:
